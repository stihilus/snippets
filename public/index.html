<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
        <meta
            property="og:image"
            content="https://github.com/stihilus/snippets/blob/main/public/og-image.png"
        />
        <meta
            name="twitter:image"
            content="https://github.com/stihilus/snippets/blob/main/public/og-image.png"
        />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1600" />
        <meta property="og:image:height" content="900" />
        <meta property="og:type" content="website" />
        <title>snippets</title>
        <meta
            name="description"
            content="Tiny code is all about creating mind-blowing visuals with minimal keystrokes."
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            "bright-orange": "#EB5A29",
                            "dark-grey": "#1E1E1E",
                            "code-grey": "#2A2A2A",
                        },
                        fontFamily: {
                            sans: ["Space Grotesk", "sans-serif"],
                        },
                        borderRadius: {
                            full: "50px",
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                font-family: "Space Grotesk", sans-serif;
            }
            .btn {
                height: 23px;
                padding-top: 0;
                padding-bottom: 0;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-size: 0.875rem;
                line-height: 1;
                text-transform: lowercase;
            }
            .modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
            }
            .modal-content {
                background-color: #1e1e1e;
                margin: 15% auto;
                padding: 20px;
                border: 1px solid #eb5a29;
                width: 300px;
                border-radius: 10px;
            }
            .close {
                color: #aaa;
                float: right;
                font-size: 28px;
                font-weight: bold;
                cursor: pointer;
            }
            .close:hover,
            .close:focus {
                color: #eb5a29;
                text-decoration: none;
                cursor: pointer;
            }
            .modal input[type="text"],
            .modal input[type="password"] {
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #eb5a29;
                background-color: #2a2a2a;
                color: white;
                border-radius: 5px;
            }
            .modal button {
                width: 100%;
                padding: 10px;
                background-color: #eb5a29;
                color: black;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
            .modal button:hover {
                opacity: 0.8;
            }
        </style>
    </head>
    <body class="bg-black text-white">
        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 class="text-xl font-bold text-bright-orange mb-4">Login</h2>
                <input
                    type="text"
                    id="loginUsername"
                    placeholder="Username"
                    required
                />
                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required
                />
                <button
                    id="loginSubmit"
                    class="btn bg-bright-orange text-black mt-4"
                >
                    Login
                </button>
            </div>
        </div>

        <!-- Register Modal -->
        <div id="registerModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 class="text-xl font-bold text-bright-orange mb-4">
                    Register
                </h2>
                <input
                    type="text"
                    id="registerUsername"
                    placeholder="Choose a username"
                    required
                />
                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Choose a password"
                    required
                />
                <button
                    id="registerSubmit"
                    class="btn bg-bright-orange text-black mt-4"
                >
                    Register
                </button>
            </div>
        </div>
        <nav class="bg-dark-grey shadow-md p-4">
            <div class="container mx-auto">
                <div
                    class="w-full md:w-1/2 mx-auto flex justify-between items-center"
                >
                    <a href="#" class="flex items-center">
                        <img
                            src="logo.svg"
                            alt="p5.js Snippets Logo"
                            class="h-8 mr-2"
                        />
                    </a>
                    <div class="flex items-flex-start">
                        <a
                            href="/tutorial"
                            class="btn text-bright-orange px-4 rounded-full hover:bg-opacity-80"
                            >tutorial</a
                        >
                        <a
                            href="#"
                            id="loginBtn"
                            class="btn bg-bright-orange text-black px-4 rounded-full hover:bg-opacity-80 justify-content-center"
                            >login</a
                        >
                        <div class="mx-2"></div>
                        <a
                            href="#"
                            id="registerBtn"
                            class="btn bg-bright-orange text-black px-4 rounded-full hover:bg-opacity-80 vertical-align: middle"
                            >reg</a
                        >
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mx-auto mt-8">
            <div id="userHeader" class="w-full md:w-1/2 mx-auto mb-4 hidden">
                <h3
                    id="userNickname"
                    class="text-2xl font-bold text-bright-orange"
                ></h3>
            </div>
            <div id="snippetInputContainer" class="w-full md:w-1/2 mx-auto">
                <textarea
                    id="snippetInput"
                    class="w-full p-2 border rounded bg-dark-grey text-white"
                    rows="4"
                    maxlength="280"
                    placeholder="Enter your p5.js snippet here..."
                ></textarea>
                <div class="flex justify-between items-center mt-2">
                    <span id="charCount" class="text-gray-400">0/280</span>
                    <div>
                        <button
                            id="previewBtn"
                            class="btn bg-bright-orange text-black px-4 rounded-full mr-2 hover:bg-opacity-80"
                        >
                            preview
                        </button>
                    </div>
                </div>
            </div>

            <div id="feed" class="w-full md:w-1/2 mx-auto mt-8">
                <!-- Snippets will be added here -->
            </div>
        </div>

        <!-- Preview Modal -->
        <div
            id="previewModal"
            class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center"
        >
            <div
                class="bg-dark-grey p-8 rounded-lg shadow-xl w-4/5 md:w-2/3 lg:w-1/2"
            >
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-bright-orange">
                        preview
                    </h2>
                    <button
                        id="closePreviewBtn"
                        class="text-gray-400 hover:text-white"
                    >
                        &times;
                    </button>
                </div>
                <div id="previewSketch" class="w-full aspect-square mb-4"></div>
                <div class="flex justify-between">
                    <button
                        id="closePreviewBtn2"
                        class="btn bg-gray-600 text-white px-4 rounded-full hover:bg-gray-700"
                    >
                        close
                    </button>
                    <button
                        id="postBtn"
                        class="btn bg-bright-orange text-black px-4 rounded-full hover:bg-opacity-80"
                        disabled
                    >
                        post
                    </button>
                </div>
            </div>
        </div>

        <script>
            let loggedInUser = null;
            let sketchCount = 0;

            function checkLoginState() {
                fetch("/check-auth")
                    .then((response) => response.json())
                    .then((data) => {
                        if (data.loggedIn) {
                            loggedInUser = data.username;
                            updateLoginState();
                        }
                    });
            }

            function handleRouting() {
                const path = window.location.pathname;
                if (path === "/") {
                    loadSnippets();
                } else if (path.startsWith("/user/")) {
                    const username = path.split("/")[2];
                    loadSnippets(username);
                }
            }

            function updateLoginState() {
                if (loggedInUser) {
                    document.getElementById("loginBtn").textContent =
                        loggedInUser;
                    document.getElementById("registerBtn").style.display =
                        "none";
                    document.getElementById("postBtn").disabled = false;
                } else {
                    document.getElementById("loginBtn").textContent = "Login";
                    document.getElementById("registerBtn").style.display =
                        "inline-block";
                    document.getElementById("postBtn").disabled = true;
                }
            }

            function createSketch(parentId, snippetCode) {
                new p5((s) => {
                    s.setup = function () {
                        const parentWidth =
                            document.getElementById(parentId).offsetWidth;
                        const canvas = s.createCanvas(parentWidth, parentWidth);
                        canvas.parent(parentId);
                    };
                    s.draw = function () {
                        try {
                            s.clear();
                            const userDraw = new Function("s", snippetCode);
                            userDraw(s);
                        } catch (error) {
                            console.error("Error in sketch:", error);
                            s.background(255, 0, 0);
                            s.fill(255);
                            s.textAlign(s.CENTER, s.CENTER);
                            s.text(
                                "Error in sketch",
                                s.width / 2,
                                s.height / 2,
                            );
                        }
                    };
                }, parentId);
            }

            function addSnippetToFeed(username, snippetCode, timestamp) {
                const sketchId = `sketch-${sketchCount++}`;
                const snippetElement = document.createElement("div");
                snippetElement.className =
                    "bg-dark-grey p-4 rounded shadow-md mb-4";
                snippetElement.innerHTML = `
                <a href="/user/${username}" class="font-bold mb-2 block username-link text-bright-orange">${username}</a>
                <div id="${sketchId}" class="w-full aspect-square mb-2"></div>
                <div class="relative">
                    <pre class="bg-code-grey p-2 rounded text-xs overflow-x-auto">${snippetCode}</pre>
                    <button class="copyBtn btn absolute top-2 right-2 bg-bright-orange text-black px-2 rounded-full text-xs hover:bg-opacity-80">Copy</button>
                </div>
                <div class="text-xs text-gray-400 mt-2">${new Date(timestamp).toLocaleString()}</div>
            `;

                const feed = document.getElementById("feed");
                feed.insertBefore(snippetElement, feed.firstChild);

                createSketch(sketchId, snippetCode);
            }

            function loadSnippets(username = null) {
                const url = username
                    ? `/api/user/${username}`
                    : "/api/snippets";

                const userHeader = document.getElementById("userHeader");
                const snippetInputContainer = document.getElementById(
                    "snippetInputContainer",
                );

                if (username) {
                    userHeader.classList.remove("hidden");
                    snippetInputContainer.classList.add("hidden");
                    document.getElementById("userNickname").textContent =
                        username;
                } else {
                    userHeader.classList.add("hidden");
                    snippetInputContainer.classList.remove("hidden");
                }

                fetch(url)
                    .then((response) => response.json())
                    .then((snippets) => {
                        document.getElementById("feed").innerHTML = "";
                        snippets.forEach((snippet) => {
                            addSnippetToFeed(
                                snippet.username,
                                snippet.code,
                                snippet.timestamp,
                            );
                        });
                    });
            }

            function loadUserProfile(username) {
                const userHeader = document.getElementById("userHeader");
                const userNickname = document.getElementById("userNickname");
                userHeader.classList.remove("hidden");
                userNickname.textContent = username;

                fetch(`/user/${username}`)
                    .then((response) => response.json())
                    .then((snippets) => {
                        document.getElementById("feed").innerHTML = "";
                        snippets.forEach((snippet) => {
                            addSnippetToFeed(
                                snippet.username,
                                snippet.code,
                                snippet.timestamp,
                            );
                        });
                    });
            }

            function updateLoginState() {
                if (loggedInUser) {
                    document.getElementById("loginBtn").textContent =
                        loggedInUser;
                    document.getElementById("registerBtn").style.display =
                        "none";
                    document.getElementById("postBtn").disabled = false;
                } else {
                    document.getElementById("loginBtn").textContent = "Login";
                    document.getElementById("registerBtn").style.display =
                        "inline-block";
                    document.getElementById("postBtn").disabled = true;
                }
            }

            document.addEventListener("click", (e) => {
                if (e.target.classList.contains("username-link")) {
                    e.preventDefault();
                    const username = e.target.textContent;
                    history.pushState(null, "", `/user/${username}`);
                    loadSnippets(username);
                }
            });

            document
                .querySelector('a[href="#"]')
                .addEventListener("click", (e) => {
                    e.preventDefault();
                    history.pushState(null, "", "/");
                    loadSnippets();
                });

            window.addEventListener("popstate", handleRouting);

            document
                .getElementById("loginBtn")
                .addEventListener("click", () => {
                    if (loggedInUser) {
                        fetch("/logout", { method: "POST" }).then(() => {
                            loggedInUser = null;
                            updateLoginState();
                        });
                    } else {
                        document.getElementById("loginModal").style.display =
                            "block";
                    }
                });

            document
                .getElementById("registerBtn")
                .addEventListener("click", () => {
                    document.getElementById("registerModal").style.display =
                        "block";
                });

            document.querySelectorAll(".close").forEach((closeBtn) => {
                closeBtn.addEventListener("click", () => {
                    closeBtn.closest(".modal").style.display = "none";
                });
            });

            document
                .getElementById("snippetInput")
                .addEventListener("input", (e) => {
                    const charCount = e.target.value.length;
                    document.getElementById("charCount").textContent =
                        `${charCount}/280`;
                });

            document
                .getElementById("previewBtn")
                .addEventListener("click", () => {
                    const snippetCode =
                        document.getElementById("snippetInput").value;
                    if (snippetCode.trim() === "") return;

                    document.getElementById("previewModal").style.display =
                        "flex";
                    createSketch("previewSketch", snippetCode);
                });

            document
                .getElementById("closePreviewBtn")
                .addEventListener("click", () => {
                    document.getElementById("previewModal").style.display =
                        "none";
                    document.getElementById("previewSketch").innerHTML = "";
                });

            document
                .getElementById("closePreviewBtn2")
                .addEventListener("click", () => {
                    document.getElementById("previewModal").style.display =
                        "none";
                    document.getElementById("previewSketch").innerHTML = "";
                });

            document.getElementById("postBtn").addEventListener("click", () => {
                if (!loggedInUser) {
                    alert("Please log in to post a snippet.");
                    return;
                }

                const snippetCode =
                    document.getElementById("snippetInput").value;
                if (snippetCode.trim() === "") return;

                fetch("/snippets", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        code: snippetCode,
                        username: loggedInUser,
                    }),
                })
                    .then((response) => response.json())
                    .then((data) => {
                        if (data.success) {
                            loadSnippets();
                            document.getElementById("snippetInput").value = "";
                            document.getElementById("charCount").textContent =
                                "0/280";
                            document.getElementById(
                                "previewModal",
                            ).style.display = "none";
                            document.getElementById("previewSketch").innerHTML =
                                "";
                        } else {
                            console.error(
                                "Failed to post snippet:",
                                data.message,
                            );
                            alert("Failed to post snippet. Please try again.");
                        }
                    })
                    .catch((error) => {
                        console.error("Error posting snippet:", error);
                        alert(
                            "An error occurred while posting the snippet. Please try again.",
                        );
                    });
            });

            document.getElementById("feed").addEventListener("click", (e) => {
                if (e.target.classList.contains("copyBtn")) {
                    const preElement = e.target.previousElementSibling;
                    const code = preElement.textContent;
                    navigator.clipboard.writeText(code).then(() => {
                        e.target.textContent = "Copied!";
                        setTimeout(() => {
                            e.target.textContent = "Copy";
                        }, 2000);
                    });
                } else if (e.target.classList.contains("username-link")) {
                    e.preventDefault();
                    const username = e.target.dataset.username;
                    loadUserProfile(username);
                }
            });

            window.addEventListener("load", () => {
                checkLoginState();
                handleRouting();
            });

            document
                .getElementById("loginSubmit")
                .addEventListener("click", () => {
                    const username =
                        document.getElementById("loginUsername").value;
                    const password =
                        document.getElementById("loginPassword").value;
                    fetch("/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password }),
                    })
                        .then((response) => response.json())
                        .then((data) => {
                            if (data.success) {
                                loggedInUser = data.username;
                                updateLoginState();
                                document.getElementById(
                                    "loginModal",
                                ).style.display = "none";
                            } else {
                                alert("Login failed. Please try again.");
                            }
                        });
                });

            document
                .getElementById("registerSubmit")
                .addEventListener("click", () => {
                    const username =
                        document.getElementById("registerUsername").value;
                    const password =
                        document.getElementById("registerPassword").value;
                    fetch("/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password }),
                    })
                        .then((response) => response.json())
                        .then((data) => {
                            if (data.success) {
                                alert(
                                    "Registration successful! You can now log in.",
                                );
                                document.getElementById(
                                    "registerModal",
                                ).style.display = "none";
                            } else {
                                alert("Registration failed. Please try again.");
                            }
                        });
                });
        </script>
    </body>
</html>
